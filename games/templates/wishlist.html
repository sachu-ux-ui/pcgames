<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Wishlist</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen p-6">

<div class="max-w-6xl mx-auto">

    <h1 class="text-3xl font-bold text-center mb-8">My Wishlist</h1>

    {% if wishlist_items %}

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">

        {% for item in wishlist_items %}
        <div class="bg-white p-5 rounded-2xl shadow-md hover:shadow-xl transition">

            <h2 class="text-xl font-semibold mb-2">
                {{ item.product.name }}
            </h2>

            <p class="text-gray-600 mb-3">
                ₹{{ item.product.price }}
            <img src="{{ item.product.Image .url }}" class="w-full h-48 object-cover rounded-lg mb-4">
            </p>

            <div class="flex gap-2">

                <form method="POST" action="{% url 'add_to_cart' item.product.id %}">
                    {% csrf_token %}
                    <button type="submit"
                        class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition w-full">
                        Add to Cart
                    </button>
                </form>

                    {% csrf_token %}
                    <button type="submit"
                        class="bg-red-500 text-white px-4 py-2 rounded-lg hover:bg-red-600 transition w-full">
                        Remove
                    </button>
                </form>

            </div>

        </div>
        {% endfor %}

    </div>

    <div class="mt-8 text-right">
        <h2 class="text-xl font-bold">
            Total: <span class="text-green-600">₹{{ total_price }}</span>
        </h2>
    </div>

    {% else %}

    <div class="text-center py-16">
        <h2 class="text-xl text-gray-500">Your wishlist is empty</h2>
    </div>

    {% endif %}

</div>

</body>
</html>
