<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Product</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
        }
    </style>
</head>

<body class="bg-gray-900 flex items-center justify-center min-h-screen text-white">

<div class="bg-gray-800 p-6 rounded-xl shadow-lg w-full max-w-md">

    <h2 class="text-2xl font-bold text-center mb-4">✏️ Edit Product</h2>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <!-- Name -->
        <input type="text" name="name" value="{{ product.name }}"
            class="w-full p-2 mb-3 rounded bg-gray-700 text-white"
            placeholder="Product Name">

        <!-- Description -->
        <textarea name="Description"
            class="w-full p-2 mb-3 rounded bg-gray-700 text-white"
            placeholder="Description">{{ product.Description }}</textarea>

        <!-- Price -->
        <input type="number" step="0.01" name="Price" value="{{ product.Price }}"
            class="w-full p-2 mb-3 rounded bg-gray-700 text-white"
            placeholder="Price">

        <!-- Quantity -->
        <input type="number" name="Quantity" value="{{ product.Quantity }}"
            class="w-full p-2 mb-3 rounded bg-gray-700 text-white"
            placeholder="Quantity">

        <!-- Category -->
        <input type="text" name="Category" value="{{ product.Category }}"
            class="w-full p-2 mb-3 rounded bg-gray-700 text-white"
            placeholder="Category">

        <!-- Image -->
        <div class="mb-3">
            <p class="text-sm mb-1">Current Image:</p>
            <img src="{{ product.Image.url }}" class="w-full h-40 object-cover rounded mb-2">
            <input type="file" name="Image" class="text-sm">
        </div>

        <!-- Buttons -->
        <div class="flex gap-2 mt-4">

            <button type="submit"
                class="flex-1 bg-blue-500 py-2 rounded hover:bg-blue-600">
                Save
            </button>

            <a href="{% url 'product_list' %}"
               class="flex-1 text-center bg-gray-500 py-2 rounded hover:bg-gray-600">
               Cancel
            </a>

        </div>

    </form>

</a>

</body>
</html>
