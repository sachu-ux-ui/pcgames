<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Form</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <div class="bg-white shadow-2xl rounded-2xl p-8 w-full max-w-lg">
        
        <h1 class="text-3xl font-bold text-center text-blue-600 mb-6">
            User Registration
        </h1>

        <form method="POST" class="space-y-5">
            {% csrf_token %}

            <!-- Name -->
            <div>
                <label class="block text-gray-700 font-semibold mb-2">
                    Name
                </label>
                <input 
                    type="text" 
                    name="name"
                    placeholder="Enter your name"
                    class="w-full px-4 py-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-400"
                    required
                >
            </div>

            <!-- Email -->
            <div>
                <label class="block text-gray-700 font-semibold mb-2">
                    Email
                </label>
                <input 
                    type="email" 
                    name="email"
                    placeholder="Enter your email"
                    class="w-full px-4 py-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-400"
                    required
                >
            </div>

            <!-- Password -->
            <div>
                <label class="block text-gray-700 font-semibold mb-2">
                    Password
                </label>
                <input 
                    type="password" 
                    name="password"
                    placeholder="Enter password"
                    class="w-full px-4 py-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-400"
                    required
                >
            </div>

            <!-- Address -->
            <div>
                <label class="block text-gray-700 font-semibold mb-2">
                    Address
                </label>
                <textarea 
                    name="address"
                    placeholder="Enter address"
                    rows="3"
                    class="w-full px-4 py-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-400"
                    required
                ></textarea>
            </div>

            <!-- Phone -->
            <div>
                <label class="block text-gray-700 font-semibold mb-2">
                    Phone
                </label>
                <input 
                    type="number" 
                    name="phone"
                    placeholder="Enter phone number"
                    class="w-full px-4 py-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-400"
                    required
                >
            </div>

            <!-- Submit Button -->
            <button 
                type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition duration-300"
            >
                Register User
            </button>

        </form>
    </div>

</body>
</html>
